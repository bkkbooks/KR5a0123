body:
  text: 長生子劉處玄注神仙抱一演道章上觀天之道執天之行盡矣觀者五眼圓明也明其天眼慧眼法眼道眼神眼五光明徹則五藴歸空見其天道也天中復有天外天在地之上清氣天也至高八萬四千里高天也在人身各受天之一氣氣有厚薄沖和則生賢聖逆而散則沉下鬼道者天地萬物之外虛無之體在人身瞥見亘容以虛心則至性與道相洽也執者守真而不偽悟正而不邪天者天生於萬物也天生萬物天生成不收亦不取濟十方三界萬民亦不望其報只要一切衆生悟天之道理盡而明矣要人萬事不憎不愛如天之平等人之有情悟天之無情便是報天之恩也若不依天理縱濁惡邪淫多病夭壽死沉地獄受苦盡則墮於傍生失其人身若依天之道常善則氣和常清則明性常忘情則保命常無染則明道常不犯天條則無罪不修世福抱道全其真福不殢傍門小法頓明無為萬法所以三界無拘盡矣天有五賊見之者昌天有五賊者天無賊非世之盜賊亦非人之六賊却是甚賊也天有五方正氣在人身中為神之母也周天十二時中自然抽添運轉至妙無窮謂之無中有天地傳陰陽秀氣生於萬物人食五穀養形滓穢沉於水火五穀之精在人身中保而為命也命得性而久性得命而壽命者北海之烏龜也丁翁常抱則成形也五賊者真陽也天之真陽見其真陰五賊盜其北海之寶寶之者昌如萬物人之盜也五賊在心施行於天宇宙在乎手萬化生乎身五賊在心者五行顛倒也在心則真水上升也逆則心竅不通腎水下行死路也世之不達聖人之道不行道之人皆如此古之悟道賢達之士多異説世人各執所見分别高低正能容邪邪多謗正邪法余觀恰似螢蟲之耀正道有似日月之光夜暗則微光且顯若見日月之光輝照遍十方三界豈見螢耀也聖人掌握宇宙陰陽變通地天交泰萬化生乎身萬化成形也萬物之中唯人一物至尊至貴也奪造化內修身外之身謂之得道通萬化外救物哀衆生悟金枷玉杻石火風燈世之夢幻遠濁惡而近於清善外應人道內行太上祖佛之真趣萬法歸一混世而性如蓮出水謂之全其德此乃止仙萬化之明達也天性人也人心機也立天之道以定人也人之天性各有善惡巨微所慕文武道俗貴賤高下人之性自古至今投胎换殼販骨更形如蟻巡環未曾暫止人心之機日常萬變各有巧拙正邪深淺慈毒孝逆寬窄長短清濁賢愚愛憎是非察其心機則知人性也立天之道天之道愚不知天之恩大春溫夏暖秋涼冬寒四時而變態生成萬物濟於人世富貴者錦衣美膳貧賤者糲食粗衣各各如意道生於物朴散以為器粧點人間如花似錦萬民歡樂天之道以定人也賢者明天道之理暗行天道不言而善應夷德不令人知洪禧不望人報人若依此行天之道其德以定濟於人也內懷通達之慧人要萬化俱明萬法俱通萬物無私萬塵無染性通於命命通於天天通於道道通於自然內全其道外全其德謂之賢聖天發殺機龍蛇起陸人發殺機天地反覆天發殺機者暖極則變涼涼變金風金變於朔氣萬木凋零枯落龍蟠巨海蛇蟄邃窟冬至一陽生漸生和氣至春分萬物生萌龍蛇起蟄於陸地人發殺機者人性乃純陽之靈耀也人心總所愛欲於世之萬物之有戀火宅恩愛七情爭名競利所迷酒色財氣種種歡愛所著無有盡期念念欲情皆屬於陰也性著於陰下則腎海金龜泄上則重樓玉汞消魂迷𩲸散真性無主外陰旺則內陽衰逐物死沉下鬼人若頓明至道悟徹萬物之有謂之陽殺其陰性如皓月心清似天萬里無雲自然光顯森羅萬象人發殺機散盡群陰自然魂清魄靜陰陽顛倒天地反覆造化生成三丹而結出天地之殼蛻形顯身外真身天人合發萬變定基天人者人性通於天也合發則心盡於物也人通徹人間世夢明知榮枯寵辱成敗禍福哀樂生死古今之常事也人通天理真榮而不枯真寵而不辱真成而不敗真福而不禍真樂而不哀真生而不死明道之常也道常而通萬變定其性之基本也至性通極無物萬變自然萬通如上善方圓曲直萬派清通於江河淮濟入巨洋而混成歸一謂之深通性有巧拙可以伏藏古之悟道之人內性善巧方便哀人外如惡拙可以伏藏內光隱而不顯也河上公云如美玉處石似明珠在蚌蛤禽之異巧鸚能語鐵籠拘囚拙鳩訥聲萬枝縱橫所以世人偽巧則生萬禍真拙則生於清福故天不言而自然變通天無情而自然不老人要明於天道忘言則窮造化之妙忘情則明亘古之容人之所欲多巧則多愆多情則多患忘世斷情則乃樂道保命之要九竅之邪在乎三要可以動靜九竅九通之陽徑未通者九陰之邪扃也人心方寸空虛內有靈明上人心有九竅中人七竅下人五竅心無竅謂之愚人邪陰生性濁陽耀降神清在乎三要天光有日月星地寶有金玉珍道通有鉛汞真可以動靜天動則三光照地靜則三寶通妙明則三靈結動者動於形也靜者靜於性也古之賢隱混世而不動心居山而不著靜形明有有動中靜通無無靜中喧動靜俱忘則得道之常妙也火生於木禍發必剋姦生於國時動必潰知之修鍊謂之聖人火生人之心日常觸處不萬變之惡於木者乃人性也念發無明火則焚其木之性也禍發必剋違吉而凶喪福而禍也剋者殺於真也姦生於國者太上經云不以智治國國之福也以智治國國之賊也佞詐人生於國難以萬民無事也時動則必潰散也愚者非理亂於世必遭刑法也不以智治國以無事治天下太平民安也知之修鍊非燒五金八石之修鍊修性命則達理通玄三教謂之悟道常救物哀世知天恩而謂之積德自黃帝之悟道有此陰符經周時金輪王悟釋有此金剛經自成佛之後號釋迦牟尼佛金剛經三十二分言其道要除我相人相衆生相壽者相無四相心上無萬愆也如天無雲性如朗月自現圓明正性也性者如樹之根也身者如人之形也萬法者如樹枝葉也陰符經造化之趣如開花結子也世人學道謂不能盡通其理各分别執根梢枝葉開花結子各執自是他非有四相心未除謂之傍門也富國安民演法章中天生天殺道之理也天地萬物之盜萬物人之盜人萬物之盜三盜既宜三才既安天生天殺者春溫和氣天生於萬物至秋深金風動萬物枯稿天殺也生殺道理天無情而自然也天地萬物之盜天地四時而變通造化生成萬物萬物之中所藏天地陰陽之秀氣萬物所盜秀氣也萬物人之盜人所盜萬物之精奪天地之秀氣也泯欲念清靜保守命也人萬物之盜人所欲萬物之華景眼觀五色耳聽五音舌餐五味醉飽腥羶縱邪生淫喪命樂極則哀人若棄世而悟無情則外物不能所盜也三盜既宜所盜無窮至寶造化成形世之萬斛珠珍難以酬價買也三才既安歸依三聖教明三乘玄悟三皇上運三光倒推三車耕透三田周天三火爐結三丹神現三陽升上三天真而不朽生而不滅盡於物道也真與道同體則安也故曰食其時百骸理動其機萬化安人知其神而神不知不神而所以神也食其時飢時遇美膳而不愛逢糲食而不嫌也不殺生食羶腥亦不修齋餐瑩素但飢時不論粗細困時睡間時唱快時吟要坐則坐要卧則卧要住則住要行則行放四大無拘自在則百骸理也十二時中對萬景只要真心常湛然動者不可動於心也內現寶光應物動於形機者聖人賢人君子謂之智將軍謂之計常人謂之機小人謂之脫空聖人為智大理深世人不能盡明其理懷妙智口應常機信者聽善者從萬通闡化頓悟則安靜道生也人知其神而神世人只知地祇陰神而神也以木雕泥捏神為神愚者不知凡造一分愆過則天降一分禍患殺害豬羊廣燒錢馬祈禱有病則求安有禍則求福不知不神而所以神也不知天上陽道至神各分方位暗察人間善惡世人造善三年不經千日而降吉祥人若造惡千日不經三年而降禍患世人不知萬物之中最靈最通者自己元神有通天徹地輝耀古之賢聖盡是悟道修真從凡入聖西天一佛至二十八代佛未修行時都是衆生為六根清淨五眼圓明泯四相名為佛佛者人之性也性者神性是神神是性只是異名釋門性除四相謂之佛道門神忘四相謂之仙日月有數大小有定聖功生焉神明出焉日月有數夏至晝六十刻漸減一陰生也冬至晝四十刻漸添一陽生也卯時東海日生酉時西山日墜清靜經云大道無情運行日月日者慧光運而抽添有數月者人之命也男子十六歲全其二八真金若不悟無情三年減一兩至八八六十四卦盡則腎海枯竭也多欲則未卦盡而夭壽節減欲則益壽延長盈而虧則人死圓而不缺則人生大小有定大者道也道大包含天地小者微也論微之妙入於毫芒運而天地不能量用而鬼神不能見自然有定於方寸聖功生焉天之道也天大恩生濟人養形道聖功生救人修真神明出焉隱而神遊於三宫顯而神通於八表其盜機也天下莫能見莫能知君子得之固窮小人得之輕命其盜機也萬物之機所盜天地之氣天下莫能見天大恩生莫能知愚者只知自能養其身不知天垂恩而養萬民春種秋收夏結冬藏應時霜雪雨露滋榮萬化世之知天恩者性通明達也君子得之固窮窮通道則天地通天地通則萬化通萬化通則神通神通則應機萬變抱一無離而閴然頤真返朴小人得之輕命小人得時欺謾天地不敬賢聖不尊國法不仁不義自強他弱害物傷人愆極則天報君子重性得通賢聖小人輕命失墮傍生強兵戰勝演術章下瞽者善聽聾者善視絶利一源用師十倍三反晝夜用師萬倍瞽者善聽人之目乃五臟之看窗也通風則睹於外物也如紙席僻風相隔似瞽者不能見外物也外景不入於中則空中有真響亮善聽無聲之聲也聾者善視但世之俗氣到耳則如聾也道念到耳則聞邪言者亦如聾也正理擇其善者耳竅通也似鑿壁透外光入於中也視無物之物乃明恍惚之妙也絶利一源忘貪而清平也亦泯利貯財損有餘而惠不足也用師十倍至閴明有十倍功利物愛人有十倍福三反晝夜一反上元賜福氣降而清也二反中元赦罪神異而靈也三反下元解厄命通陰變為陽也用師萬倍世人興販物貨萬苦千辛更廣有利者難取一倍利悟道修真全其性命得無窮福壽住仙宫寶所受天上富貴譬喻人之求福利則及萬倍便海變桑田永居不夜之鄉真樂何至只萬倍利也心生於物死於物機在目心生於物著於物外也死於心死則通於靈物也世求生則性歸死路達道則守死神遊生路道與俗生與死路異相違也機在目外目視於物心動於機也利而有害貪而有爭也慧目視靈物明於天機知道要妙物我俱泯也俗機益於己損於人道機損於己益於人也天之無恩而大恩生迅雷烈風莫不蠢然天之無恩布氣生物而不有而大恩生萬物生成也萬物不得天地之氣不能造化成形天大恩生若無恩者天不望其報也人恩惠見其有者望其報也天恩與人恩異也迅雷鳴則甘雨降天地生萌烈風動則浮雲散萬里天青莫不蠢然蠢動舍靈胎卵濕化莫不總受天之一氣生何況萬物之無情之物至樂性餘至靜性廉常樂道性之無餘厭身世之有餘我無喜則無憂人有歡則有愁悟恬淡得之真常迷聲色失之幻夢至靜性廉至靜則盡於物也性廉如蓮不著於水也達道之人居塵不染在欲無欲磨開寶鏡應物之形影何礙有一等不達中邊悟道之螢耀認至靜棄有著無有取捨之妄想分别高下誇得道之妙世之如麻也按太上道德經云善言不美美言不善正道真言不美邪法偽傳多美管見之明愛其美所以著於邪不能達大道也天之至私用之至公天施恩不令下知至私也生成濟於人世至公也人之有道如石中藏玉世之肉眼未見其珍頻磨頻琢異日功成現身外之身朴散成於大器人之無道似蠹木之樹天眼有日見用斧用鋸片時朽爛唬得魂飛魄散濁性永墮幽冥修道衰世苦盡甘來造惡福謝萬禍臨身天意順者逆行逆者順行君子之上賢達崇於道德天報預至私盡至公小人之下匹夫競於色財天報先至公終至私禽之制在氣禽之制百禽異勝者南山赤鳳也通輕清之氣性靈則乘風入於九霄在氣濁則沉地清則升天因下濁而上清烏龜吸乾北海吐輕清元氣八百一十丈乃九九之陽數也禽之三寸沖和與元氣相接不散氣通神神通道道通自然生者死之根死者生之根恩生於害害生於恩生者死之根世之求生之厚利多則害身入於死路也死者生之根抱道不求生德多則全身入於生路也迷者晝貪世寶夜喪內珍悟者坐忘世夢卧守內真恩生於害七情恩憐於偽六賊暗害於真害生於恩害生者慧劍斷愛欲也於恩者達道知天恩也鷇食則人無害鶉居則情無恩愚人以天地文理聖我以時物文理哲愚人以天地文理聖愚者喪命告天求安日常積愆禱聖求福賢者知保命則自神靈無罪則道福洪人濁惡天地降其禍人清善聖賢賜其禧大地衆生總造業不改禱聖賢萬禍難免中華女男都崇真有志不祈天地善福常侵我以時物文理哲我以周天十二時窮萬物之變文俊顯萬華理明顯萬通哲極闡萬化自然清靜無為也自然道也清者天也靜者地也無者性與道體同也為者施恩不望其報也萬物造化與人造化無異也天地運氣物通變也玉鼎烹鉛則金爐鍊汞也七返通靈九還丹結姹女離宫則嬰兒坎户也龜蛇蟠繞則龍虎咆哮也前朱雀行則後玄武隨也金翁守庚辛則黃婆伴甲乙也巨海撈金則崑山鑿玉也黃芽長則白雪生也玉花開則金蓮結也三光照則七寶明也二八無虧則六三無缺也金木間隔則水火相逢也恍惚之中則隱顯難測也道之用也黃帝陰符經注終
