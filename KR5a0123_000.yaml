front:
  text: 黃帝陰符經注序餘六陰符真經三百餘字言簡而意詳文深而事備天地生殺之機陰陽造化之理妙用真功包涵總括盡在其中矣昔軒轅黃帝萬機之暇淵默沖虛獲遇真經就崆洞山而問天真皇人廣成先生得其真趣勤而行之一旦鼎湖乘火龍而登天斯文遂傳於世後之修仙慕道者而能默識玄機深造閫域往往高舉遠致躡景升虛不為不多矣數千載之間為之注解直説者曾無一二皆辭多假諭傍引曲説真源弗露使夫學者困於多岐以至皓首區區勞而無功愈窮而愈惑半途而止者不可勝紀遂指仙經為虛語深可憫也神山長生劉公真人教法令器師席宏才學貫古今心遊道德乃覃思研精探賾索隱為之注解坦然明白易知易行以利後人可謂慈憫仁人之用心也濟南畢守真命懌作序欲廣傳於四方為學者之指南而學者詳覽斯文可以寤疑辨惑皆能擺脫塵網直厠真遊逍遙於混茫之域矣明昌辛亥二月既望寧海州學正范懌德裕序黃帝陰符經注
