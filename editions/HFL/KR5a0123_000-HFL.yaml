front:
  text: 黄帝陰符經注序餘六陰符眞經三百餘字言簡而意詳文深而事備天地生殺之機陰陽造化之理妙用眞功包涵總括盡在其中矣昔軒轅黄帝萬機之暇淵默沖虚獲遇眞經就崆峒山而問天眞皇人廣成先生得其眞趣勤而行之一旦鼎湖乘火龍而登天斯文遂傳於世後之修仙慕道者而能默識玄機深造閫域往往高舉遠致躡景升虚不爲不多矣數千載之間爲之註解直說者曾無一二皆辭多假諭傍引曲說眞源弗露使夫學者困於多岐以至皓首區區勞而無功愈窮而愈惑半途而止者不可勝紀遂指仙經爲虚語深可憫也神山長生劉公眞人教法令器師席宏才學貫古今心游道德乃覃思研精探賾索隱爲之註解坦然明白易知易行以利後人可謂慈憫仁人之用心也濟南畢守眞命懌作序欲廣傳於四方爲學者之指南而學者詳覽斯文可以寤疑辯惑皆能擺脱塵網直厠眞游逍遥於混茫之域矣明昌辛亥二月既望寧海州學正范懌德裕序黄帝陰符經註
